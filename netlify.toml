[build]
  command = "npm run build"
  functions = ".svelte-kit/netlify/functions"
  publish = ".svelte-kit/netlify/build"

[context.production]
  command = "npm run build"
  publish = ".svelte-kit/netlify/build"

[context.deploy-preview]
  command = "npm run build"
  publish = ".svelte-kit/netlify/build"

[context.branch-deploy]
  command = "npm run build"
  publish = ".svelte-kit/netlify/build"
